name: Enterprise CI/CD

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

env:
  FOUNDRY_PROFILE: ci

jobs:
  # ── Stage 1: Build & Compile ────────────────────────────────────
  build:
    name: Build & Compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Build contracts
        run: forge build --sizes
        id: build

      - name: Check contract sizes
        run: |
          echo "Checking contract sizes..."
          forge build --sizes 2>&1 | tee /tmp/sizes.txt
          if grep -q "exceeds" /tmp/sizes.txt; then
            echo "WARNING: Some contracts exceed the 24KB size limit"
            exit 1
          fi

  # ── Stage 2: Unit Tests ─────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Run unit tests
        run: forge test --match-path "test/unit/*" -vvv --gas-report | tee gas-report.txt

      - name: Upload gas report
        uses: actions/upload-artifact@v4
        with:
          name: gas-report
          path: gas-report.txt

  # ── Stage 3: Integration Tests ──────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Run integration tests
        run: forge test --match-path "test/integration/*" -vvv

  # ── Stage 4: Invariant Tests ────────────────────────────────────
  invariant-tests:
    name: Invariant & Fuzz Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Run invariant tests
        run: forge test --match-path "test/invariant/*" -vvv

  # ── Stage 5: Security Analysis ──────────────────────────────────
  security:
    name: Security Analysis
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Slither
        run: pip3 install slither-analyzer

      - name: Run Slither
        run: |
          slither . --config-file slither.config.json \
            --checklist \
            --markdown-root . \
            --fail-on high \
            2>&1 | tee slither-report.md || true

      - name: Upload Slither report
        uses: actions/upload-artifact@v4
        with:
          name: slither-report
          path: slither-report.md

  # ── Stage 6: Code Quality ───────────────────────────────────────
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Check formatting
        run: forge fmt --check

      - name: Check for console.log in src/
        run: |
          if grep -r "console.log" src/; then
            echo "ERROR: console.log found in source contracts"
            exit 1
          fi

      - name: Check for TODO items
        run: |
          echo "=== TODO items in source code ==="
          grep -rn "TODO" src/ || echo "No TODO items found"

  # ── Stage 7: Gas Optimization Check ─────────────────────────────
  gas-check:
    name: Gas Snapshot
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Generate gas snapshot
        run: forge snapshot --check || forge snapshot

      - name: Upload snapshot
        uses: actions/upload-artifact@v4
        with:
          name: gas-snapshot
          path: .gas-snapshot

  # ── Stage 8: Coverage ───────────────────────────────────────────
  coverage:
    name: Test Coverage
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Generate coverage report
        run: forge coverage --report summary | tee coverage.txt

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.txt
