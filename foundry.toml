[profile.default]
src = "src"
out = "out"
libs = ["lib"]
optimizer = true
optimizer_runs = 10000
evm_version = "cancun"
via_ir = false
ffi = true
fs_permissions = [{ access = "read-write", path = "./"}]

[profile.default.fuzz]
runs = 1000
max_test_rejects = 100000

[profile.default.invariant]
runs = 64
depth = 16

[profile.ci]
fuzz = { runs = 2000 }
invariant = { runs = 128, depth = 32 }

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true

[rpc_endpoints]
fuji = "${RPC_AVALANCHE_FUJI}"
bnb_testnet = "${RPC_BNB_TESTNET}"
monad_testnet = "${RPC_MONAD_TESTNET}"
sepolia = "${RPC_ETHEREUM_SEPOLIA}"

# NOTE: Snowtrace may timeout on first attempt. Use --retries 5 with forge verify-contract.
[etherscan]
fuji = { key = "${SNOWTRACE_API_KEY}", url = "https://api-testnet.snowtrace.io/api" }
bnb_testnet = { key = "${BSCSCAN_API_KEY}", url = "https://api-testnet.bscscan.com/api" }
sepolia = { key = "${ETHERSCAN_API_KEY}" }
